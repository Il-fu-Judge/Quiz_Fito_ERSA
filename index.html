<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Quiz Generator</title>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#f2f2f2;
}

#app{
    width:100%;
    display:flex;
    justify-content:center;
}

.screen{
    width:100%;
    max-width:600px;
    padding:20px;
}

.center-screen{
    min-height:80vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

h1,h2{
    text-align:center;
}

.answers{
    margin-top:25px;
    display:flex;
    flex-direction:column;
    gap:12px;
}

.answer-btn{
    padding:14px;
    font-size:16px;
    border:none;
    background:white;
    border-radius:8px;
    cursor:pointer;
}

.answer-btn:hover{
    background:#e8e8e8;
}

.next-container{
    display:flex;
    justify-content:flex-end;
    margin-top:20px;
}

button{
    padding:12px 18px;
    font-size:16px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#0077ff;
    color:white;
}

button:hover{
    background:#005fd1;
}

.result{
    font-size:22px;
    text-align:center;
    margin:20px 0;
}

</style>
</head>

<body>

<div id="app"></div>

<script src="main.js"></script>

</body>
</html>
