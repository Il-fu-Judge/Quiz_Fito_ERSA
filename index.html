<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Test Patentino Fitosanitari ERSA</title>

    <style>
        /* RESET E SFONDO CON PATTERN */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Sfondo con pattern moderno in CSS */
            background-color: #f0f4f0;
            background-image: radial-gradient(#2e7d32 0.5px, transparent 0.5px), radial-gradient(#2e7d32 0.5px, #f0f4f0 0.5px);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            
            display: flex;
            justify-content: center;
            align-items: center; 
            color: #333;
        }

        #app {
            max-width: 600px;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            z-index: 1;
        }

        /* CARD PRINCIPALE */
        .card {
            background: rgba(255, 255, 255, 0.95); /* Leggermente trasparente per far intravedere il pattern */
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            text-align: center;
            backdrop-filter: blur(5px); /* Effetto sfocatura moderno */
        }

        h1 {
            font-size: 26px;
            margin-bottom: 10px;
            color: #2e7d32;
        }

        .subtitle {
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .source-info {
            font-size: 12px;
            color: #666;
            display: block;
            margin-top: 10px;
        }

        /* PULSANTI */
        button {
            font-size: 18px;
            padding: 14px 24px;
            border-radius: 10px;
            border: none;
            background: #e0e0e0;
            color: #333;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
        }

        button:active {
            transform: scale(0.97);
        }

        #start-btn {
            width: 100%;
            background: #2e7d32;
            color: white;
        }

        #start-btn:hover {
            background: #1b5e20;
            box-shadow: 0 4px 12px rgba(46, 125, 50, 0.3);
        }

        /* SCHERMATA QUIZ */
        .quiz-screen {
            text-align: left;
        }

        .question {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 25px;
            line-height: 1.4;
            color: #1b5e20;
        }

        /* OPZIONI RISPOSTA */
        .option {
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 12px;
            font-size: 17px;
            background: white;
            cursor: pointer;
            transition: all 0.2s ease;
            display: block;
            width: 100%;
            text-align: left;
            box-sizing: border-box;
        }

        .option:hover {
            border-color: #2e7d32;
            background: #f8faf8;
            transform: translateY(-2px);
        }

        .option.correct {
            background: #4CAF50 !important;
            color: white;
            border-color: #4CAF50;
        }

        .option.wrong {
            background: #f44336 !important;
            color: white;
            border-color: #f44336;
        }

        /* TIMER E PROGRESSO */
        #timer {
            font-weight: bold;
            color: #666;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }

        #timeBarContainer {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 10px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        #timeBar {
            height: 100%;
            width: 100%;
            background: #4CAF50;
            transition: width 1s linear;
        }

        /* PULSANTE AVANTI */
        .next-container {
            margin-top: 20px;
            display: flex;
            justify-content: flex-end;
        }

        #nextBtn {
            background: #2e7d32;
            color: white;
            padding: 12px 35px;
        }

        /* RISULTATI FINALI */
        .result-screen h1 {
            font-size: 48px;
            margin: 10px 0;
        }

        #restartBtn {
            width: 100%;
            background: #333;
            color: white;
            margin-top: 15px;
        }
    </style>
</head>

<body>

    <div id="app">
        <div id="start-screen" class="card">
            <h1>Patentino Fitosanitario</h1>
            <p class="subtitle">
                Esercitazione per il rilascio del certificato di abilitazione.
                <span class="source-info">(Domande estratte dal sito ERSA - Aggiornato a Marzo 2026)</span>
            </p>
            <button id="start-btn">Inizia il Quiz</button>
        </div>

        <div id="quiz-container" style="display:none;" class="card"></div>

        <div id="score"></div>
    </div>

    <script src="main.js"></script>
</body>
</html>
