<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>Esercitazione Patentino Fitosanitario</title>

    <style>
        :root {
            --primary-green: #2e7d32;
            --white: #ffffff;
            --text-dark: #333333;
            --bg-gray: #f8f9f8;
            --error-red: #d32f2f;
        }

        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--white);
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #app {
            width: 100%;
            max-width: 600px;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }

        /* --- SCHERMATA INIZIALE --- */
        .start-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        h1 {
            color: var(--primary-green);
            font-size: 28px;
            margin-bottom: 15px;
        }

        .subtitle {
            font-size: 18px;
            color: #555;
            margin-bottom: 40px;
        }

        .source-info {
            font-size: 13px;
            color: #888;
            margin-top: 20px;
        }

        /* --- PROGRESS BAR --- */
        .header-quiz {
            width: 100%;
            padding: 10px 0;
        }

        .progress-container {
            height: 8px;
            background-color: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 5px;
        }

        #progressBar {
            height: 100%;
            width: 0%;
            background-color: var(--primary-green);
            transition: width 0.4s ease;
        }

        #timer-display {
            font-weight: bold;
            color: var(--primary-green);
            font-size: 14px;
            text-align: right;
            display: block;
        }

        /* --- CONTENUTO QUIZ --- */
        .quiz-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .question {
            font-size: 22px;
            font-weight: bold;
            line-height: 1.4;
            margin-bottom: 30px;
            color: #000;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            background: var(--white);
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 16px;
            font-size: 17px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }

        .option:hover {
            border-color: var(--primary-green);
            background-color: #f1f8f1;
        }

        .option.selected {
            border-color: var(--primary-green);
            background-color: #e8f5e9;
        }

        /* --- FOOTER FEEDBACK (Stile Immersivo) --- */
        #feedback-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 30px 20px;
            display: none;
            justify-content: center;
            z-index: 100;
        }

        .feedback-content {
            max-width: 600px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .feedback-text h2 {
            margin: 0;
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .correct-bg { background-color: #e8f5e9; color: var(--primary-green); border-top: 2px solid var(--primary-green); }
        .wrong-bg { background-color: #ffebee; color: var(--error-red); border-top: 2px solid var(--error-red); }

        /* --- BOTTONI --- */
        .btn-main {
            background-color: var(--primary-green);
            color: white;
            padding: 16px 32px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            transition: opacity 0.2s;
        }

        .btn-main:active {
            opacity: 0.8;
        }

        #nextBtn {
            background-color: var(--primary-green);
        }

        .wrong-bg #nextBtn {
            background-color: var(--error-red);
        }

        /* RISULTATI */
        .result-screen {
            text-align: center;
            justify-content: center;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .score-val {
            font-size: 54px;
            font-weight: 800;
            color: var(--primary-green);
            margin: 20px 0;
        }
    </style>
</head>

<body>

    <div id="app">
        <div id="start-screen" class="start-screen">
            <h1>Patentino Fitosanitario</h1>
            <p class="subtitle">Esercitazione per il rilascio del certificato di abilitazione.</p>
            <button id="start-btn" class="btn-main">Inizia il Quiz</button>
            <span class="source-info">Domande tratte dal sito ERSA • Aggiornato a Marzo 2026</span>
        </div>

        <div id="quiz-container" style="display:none; height: 100%;">
            <div class="header-quiz">
                <span id="timer-display">60s</span>
                <div class="progress-container">
                    <div id="progressBar"></div>
                </div>
            </div>

            <div class="quiz-content">
                <div id="question-text" class="question"></div>
                <div id="options-container" class="options-container"></div>
            </div>
        </div>

        <div id="score-screen" style="display:none;" class="result-screen"></div>
    </div>

    <div id="feedback-footer">
        <div class="feedback-content">
            <div class="feedback-text">
                <h2 id="feedback-title">Corretto</h2>
            </div>
            <button id="nextBtn" class="btn-main" onclick="nextQuestion()">Continua</button>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
