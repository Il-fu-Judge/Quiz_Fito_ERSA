<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>Esercitazione Patentino Fitosanitari ERSA</title>

    <style>
        /* RESET E BASE */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #f5f7f5;
            color: #333;
            overflow: hidden; /* Evita scroll durante il quiz */
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center; /* Centratura verticale globale */
        }

        #app {
            max-width: 600px;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }

        /* PULSANTI ERSA - Grandi, Verdi, Testo Bianco */
        .btn-ersa {
            background-color: #2e7d32 !important;
            color: white !important;
            font-size: 18px;
            font-weight: bold;
            padding: 18px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            width: 100%;
            display: block;
            box-sizing: border-box;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* SCHERMATA INIZIALE */
        .start-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        h1 { font-size: 26px; color: #2e7d32; margin-bottom: 10px; }
        .subtitle { font-size: 18px; color: #555; margin-bottom: 30px; }
        .source-info { font-size: 13px; color: #888; margin-top: 20px; }

        /* QUIZ SCREEN - Centratura Verticale Reale */
        .quiz-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center; /* Forza le domande al centro */
            height: 100%;
        }

        .question {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 25px;
            line-height: 1.4;
            text-align: center;
        }

        /* TIMER E PROGRESSO */
        #timeBarContainer {
            width: 100%;
            height: 10px;
            background: #ddd;
            border-radius: 5px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        #timeBar {
            height: 100%;
            width: 100%;
            background: #2e7d32;
            transition: width 1s linear;
        }

        /* OPZIONI RISPOSTA */
        .option {
            border: 2px solid #2e7d32;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 14px;
            font-size: 18px;
            background: white;
            cursor: pointer;
        }
        .option.correct { background: #2e7d32 !important; color: white !important; }
        .option.wrong { background: #b71c1c !important; color: white !important; border-color: #b71c1c !important; }

        /* TASTO AVANTI STICKY */
        #nextBtn {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 560px;
            display: none;
            z-index: 100;
        }

        /* RISULTATI */
        .result-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .result-title {
            font-size: 28px;
            font-weight: bold;
            color: #2e7d32;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .score-box {
            width: 100%;
            padding: 35px 20px;
            border-radius: 20px;
            color: white;
            margin-bottom: 25px;
            box-sizing: border-box;
        }

        .score-box h2 { font-size: 55px; margin: 0; }
        .score-box p { font-size: 18px; margin-top: 12px; line-height: 1.4; }

        /* COLORI BOX RISULTATI */
        .bg-pass { background-color: #2e7d32; }
        .bg-oral { background-color: #ff9800; }
        .bg-fail { background-color: #b71c1c; } /* Rosso riposante */

    </style>
</head>

<body>
    <div id="app">
        <div id="start-screen" class="start-screen">
            <h1>Patentino Fitosanitario</h1>
            <p class="subtitle">Esercitazione per il rilascio del certificato di abilitazione.</p>
            <button id="start-btn" class="btn-ersa">Inizia l'esercitazione</button>
            <p class="source-info">Domande tratte dal sito ERSA • Aggiornato a Marzo 2026</p>
        </div>

        <div id="quiz-container" style="display:none; height: 100%;"></div>

        <div id="score" style="display:none; height: 100%;"></div>
    </div>

    <script src="main.js"></script>
</body>
</html>
