<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Esercitazione Patentino Fitosanitari ERSA</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2e7d32">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #f5f7f5;
            color: #333;
        }

        body {
            display: flex;
            justify-content: center;
        }

        #app {
            max-width: 600px;
            width: 100%;
            height: 100dvh; /* Dynamic VH per mobile */
            display: flex;
            flex-direction: column;
            padding: 15px;
            box-sizing: border-box;
        }

        .btn-ersa {
            background-color: #2e7d32 !important;
            color: white !important;
            font-size: 18px;
            font-weight: bold;
            padding: 16px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            width: 100%;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* SCHERMATA INIZIALE */
        .start-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* QUIZ SCREEN */
        .quiz-screen {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        #timeBarContainer {
            width: 100%;
            height: 8px;
            background: #ddd;
            border-radius: 4px;
            margin-bottom: 10px;
            flex-shrink: 0;
        }
        #timeBar {
            height: 100%;
            width: 100%;
            background: #2e7d32;
            transition: width 1s linear;
        }

        /* AREA CENTRALE CHE SBORDA SE NECESSARIO */
        .play-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow-y: auto;
            padding: 10px 0;
        }

        .question {
            font-size: 19px;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
        }

        .option {
            border: 2px solid #2e7d32;
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 10px;
            font-size: 17px;
            background: white;
            cursor: pointer;
        }
        .option.correct { background: #2e7d32 !important; color: white !important; }
        .option.wrong { background: #b71c1c !important; color: white !important; border-color: #b71c1c !important; }

        /* TASTO AVANTI - Non più assoluto, così spinge il contenuto */
        #nextBtn {
            margin-top: 10px;
            margin-bottom: 5px;
            flex-shrink: 0;
        }

        /* RISULTATI */
        .result-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .score-box {
            width: 100%;
            padding: 20px;
            border-radius: 20px;
            color: white;
            margin-bottom: 20px;
        }
        .bg-pass { background-color: #2e7d32; }
        .bg-oral { background-color: #ff9800; }
        .bg-fail { background-color: #b71c1c; }

    </style>
</head>

<body>
    <div id="app">
        <div id="start-screen" class="start-screen">
            <h1>Patentino Fitosanitario</h1>
            <p style="margin-bottom:20px;">Esercitazione ufficiale ERSA</p>
            <button id="install-btn" class="btn-ersa" style="display:none; background-color: #1565c0 !important; margin-bottom: 10px;">Installa App Android</button>
            <button id="start-btn" class="btn-ersa">Inizia</button>
        </div>

        <div id="quiz-container" style="display:none; height: 100%;"></div>
        <div id="score" style="display:none; height: 100%;"></div>
    </div>
    <script src="main.js"></script>
</body>
</html>
