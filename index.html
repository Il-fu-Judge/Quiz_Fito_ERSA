<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Test Patentino Fitosanitari ERSA</title>

<style>

/* CSS BASE */

body {
    margin:0;
    font-family: Arial, sans-serif;
}


/* QUIZ LAYOUT (il tuo CSS) */

body.quiz-active {
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.quiz-screen{
    width:95%;
    max-width:600px;
}

.answers{
    display:flex;
    flex-direction:column;
    gap:12px;
    margin-top:20px;
}

.option{
    padding:16px;
    border:2px solid #2e7d32;
    border-radius:10px;
    font-size:18px;
}

.option.correct{
    background:#4CAF50;
    color:white;
}

.option.wrong{
    background:#f44336;
    color:white;
}

.next-container{
    display:flex;
    justify-content:flex-end;
    margin-top:15px;
}

#nextBtn{
    padding:12px 20px;
    font-size:16px;
    border-radius:8px;
}


/* START SCREEN */

#start-screen{
    text-align:center;
    padding-top:80px;
}

#start-btn{
    margin-top:30px;
    font-size:20px;
    padding:16px 28px;
    border-radius:10px;
    border:2px solid #2e7d32;
    background:white;
    color:#2e7d32;
}


/* QUIZ ELEMENTI */

.question{
    font-size:20px;
    margin-top:20px;
}

#timer{
    text-align:center;
    font-weight:bold;
    margin-bottom:6px;
}

#timeBarContainer{
    width:100%;
    height:8px;
    background:#ddd;
    border-radius:4px;
    overflow:hidden;
}

#timeBar{
    height:100%;
    background:#4CAF50;
    width:100%;
}


/* CONTATORE */

#score{
    position:fixed;
    bottom:15px;
    left:15px;
    font-weight:bold;
}


/* RISULTATO */

#resultScreen{
    color:white;
    padding:40px;
    border-radius:10px;
    text-align:center;
}

#restartBtn{
    margin-top:20px;
    padding:14px 22px;
    font-size:18px;
    border-radius:8px;
}

</style>

</head>


<body>


<div id="start-screen">

<h1>Test Patentino Fitosanitari ERSA</h1>

<p>(Marzo 2026)</p>

<button id="start-btn">Genera Quiz</button>

</div>


<div id="quiz-container"></div>


<div id="score"></div>


<script src="main.js"></script>

</body>

</html>
