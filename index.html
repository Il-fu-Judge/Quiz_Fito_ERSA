<!DOCTYPE html>
<html lang="it">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Test Patentino Fitosanitari ERSA</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background:#f5f7f5;
margin:0;
padding:0;
display:flex;
justify-content:center;
}

#app{
max-width:600px;
width:100%;
padding:20px;
box-sizing:border-box;
}

h1{
text-align:center;
font-size:24px;
margin-bottom:30px;
color:#2e7d32;
}

button{
font-size:18px;
padding:14px;
border-radius:8px;
border:2px solid #2e7d32;
background:white;
color:#2e7d32;
cursor:pointer;
}

button:active{
transform:scale(0.97);
}

#start-btn{
width:100%;
font-size:20px;
background:#2e7d32;
color:white;
}

.question{
font-size:20px;
margin-bottom:20px;
}

.quiz-screen{
    max-width:700px;
    margin:auto;
    min-height:70vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.answers{
    margin-top:20px;
}

.next-container{
    display:flex;
    justify-content:flex-end;
    margin-top:15px;
}
    
.option{
border:2px solid #2e7d32;
border-radius:10px;
padding:16px;
margin-bottom:14px;
font-size:18px;
background:white;
cursor:pointer;
}

.option:active{
transform:scale(0.98);
}

.option.correct{
background:#4CAF50;
color:white;
border-color:#4CAF50;
}

.option.wrong{
background:#f44336;
color:white;
border-color:#f44336;
}

#timer{
font-size:18px;
margin-bottom:8px;
}

#timeBarContainer{
width:100%;
height:10px;
background:#ddd;
border-radius:5px;
margin-bottom:20px;
overflow:hidden;
}

#timeBar{
height:100%;
width:100%;
background:#4CAF50;
transition:width 1s linear;
}

#nextBtn{
width:120px;
position:fixed;
bottom:20px;
right:20px;
background:#2e7d32;
color:white;
border:none;
font-size:18px;
}

#score{
position:fixed;
bottom:20px;
left:20px;
font-size:16px;
background:white;
padding:8px 12px;
border-radius:6px;
border:1px solid #ccc;
}

#resultScreen{
color:white;
padding:30px;
border-radius:10px;
text-align:center;
}

</style>

</head>

<body>

<div id="app">

<h1>Test Patentino Fitosanitari ERSA (Marzo 2026)</h1>

<div id="start-screen">
<button id="start-btn">Genera Quiz</button>
</div>

<div id="quiz-container" style="display:none;"></div>

<div id="score"></div>

</div>

<script src="main.js"></script>

</body>
</html>
