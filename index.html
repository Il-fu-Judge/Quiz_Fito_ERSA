<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Test Patentino Fitosanitari ERSA</title>

    <style>
        /* RESET E CENTRATURA VERTICALE */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f4f0;
            display: flex;
            justify-content: center;
            align-items: center; /* Centra verticalmente */
            color: #333;
        }

        #app {
            max-width: 600px;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        /* CARD PRINCIPALE */
        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 {
            font-size: 26px;
            margin-bottom: 20px;
            color: #2e7d32;
        }

        /* PULSANTI */
        button {
            font-size: 18px;
            padding: 14px 24px;
            border-radius: 10px;
            border: none;
            background: #e0e0e0;
            color: #333;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
        }

        button:hover {
            background: #d5d5d5;
        }

        button:active {
            transform: scale(0.97);
        }

        #start-btn {
            width: 100%;
            background: #2e7d32;
            color: white;
            margin-top: 20px;
        }

        #start-btn:hover {
            background: #1b5e20;
        }

        /* SCHERMATA QUIZ */
        .quiz-screen {
            text-align: left;
        }

        .question {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        .answers {
            margin-top: 10px;
        }

        /* OPZIONI RISPOSTA */
        .option {
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 12px;
            font-size: 17px;
            background: white;
            cursor: pointer;
            transition: border-color 0.3s, background 0.3s;
            display: block;
            width: 100%;
            text-align: left;
            box-sizing: border-box;
        }

        .option:hover {
            border-color: #2e7d32;
            background: #f1f8f1;
        }

        .option.correct {
            background: #4CAF50 !important;
            color: white;
            border-color: #4CAF50;
        }

        .option.wrong {
            background: #f44336 !important;
            color: white;
            border-color: #f44336;
        }

        /* TIMER E PROGRESSO */
        #timer {
            font-weight: bold;
            color: #666;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }

        #timeBarContainer {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 10px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        #timeBar {
            height: 100%;
            width: 100%;
            background: #4CAF50;
            transition: width 1s linear;
        }

        /* PULSANTE AVANTI */
        .next-container {
            margin-top: 20px;
            min-height: 50px;
        }

        #nextBtn {
            float: right;
            background: #2e7d32;
            color: white;
            padding: 10px 30px;
        }

        /* RISULTATI FINALI */
        .result-screen h1 {
            font-size: 48px;
            margin: 10px 0;
        }

        #score-status {
            font-size: 18px;
            margin-bottom: 20px;
        }

        #restartBtn {
            width: 100%;
            background: #333;
            color: white;
        }
    </style>
</head>

<body>

    <div id="app">
        <div id="start-screen" class="card">
            <h1>Patentino Fitosanitario</h1>
            <p>Esercitazione ufficiale ERSA<br>30 domande estratte casualmente.</p>
            <button id="start-btn">Inizia il Quiz</button>
        </div>

        <div id="quiz-container" style="display:none;" class="card"></div>

        <div id="score"></div>
    </div>

    <script src="main.js"></script>
</body>
</html>
