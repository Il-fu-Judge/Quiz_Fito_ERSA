<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Esercitazione Patentino Fitosanitari ERSA</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2e7d32">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        /* RESET E BASE MOBILE-FRIENDLY */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #f5f7f5;
            color: #333;
            overflow: hidden; /* Evita lo scroll dell'intera pagina */
        }

        body {
            display: flex;
            justify-content: center;
        }

        #app {
            max-width: 600px;
            width: 100%;
            height: 100%; /* Altezza fissa allo schermo */
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
        }

        /* PULSANTI ERSA */
        .btn-ersa {
            background-color: #2e7d32 !important;
            color: white !important;
            font-size: 18px;
            font-weight: bold;
            padding: 18px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            width: 100%;
            display: block;
            box-sizing: border-box;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            -webkit-appearance: none;
        }

        /* SCHERMATA INIZIALE */
        .start-screen {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        h1 { font-size: 26px; color: #2e7d32; margin-bottom: 10px; }
        .subtitle { font-size: 18px; color: #555; margin-bottom: 30px; }
        .source-info { font-size: 13px; color: #888; margin-top: 20px; }

        /* QUIZ SCREEN - STRUTTURA ANTI-SOVRAPPOSIZIONE */
        .quiz-screen {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        /* Contenitore per Domanda e Opzioni che permette lo scroll se serve */
        .scrollable-content {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            justify-content: center; /* Centra il contenuto verticalmente nel poco spazio */
            padding-bottom: 100px; /* SPAZIO RISERVATO PER IL TASTO AVANTI */
            box-sizing: border-box;
        }

        .question {
            font-size: 19px;
            font-weight: bold;
            margin-bottom: 25px;
            line-height: 1.4;
            text-align: center;
        }

        /* TIMER E PROGRESSO */
        #timeBarContainer {
            width: 100%;
            height: 10px;
            background: #ddd;
            border-radius: 5px;
            margin-bottom: 15px;
            flex-shrink: 0; /* Impedisce alla barra di rimpicciolirsi */
        }
        #timeBar {
            height: 100%;
            width: 100%;
            background: #2e7d32;
            transition: width 1s linear;
        }

        .option {
            border: 2px solid #2e7d32;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 12px;
            font-size: 17px;
            background: white;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .option.correct { background: #2e7d32 !important; color: white !important; }
        .option.wrong { background: #b71c1c !important; color: white !important; border-color: #b71c1c !important; }

        /* TASTO AVANTI - Posizionato sopra il padding del contenitore */
        #nextBtn {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            width: auto;
            display: none;
            z-index: 100;
        }

        /* RISULTATI */
        .result-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow-y: auto;
        }

        .result-title {
            font-size: 24px;
            font-weight: bold;
            color: #2e7d32;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .score-box {
            width: 100%;
            padding: 30px 20px;
            border-radius: 20px;
            color: white;
            margin-bottom: 25px;
            box-sizing: border-box;
        }

        .score-box h2 { font-size: 50px; margin: 0; }
        .score-box p { font-size: 17px; margin-top: 12px; line-height: 1.4; }

        .bg-pass { background-color: #2e7d32; }
        .bg-oral { background-color: #ff9800; }
        .bg-fail { background-color: #b71c1c; }

    </style>
</head>

<body>
    <div id="app">
        <div id="start-screen" class="start-screen">
            <h1>Patentino Fitosanitario</h1>
            <p class="subtitle">Esercitazione per il rilascio del certificato di abilitazione.</p>
            
            <button id="install-btn" class="btn-ersa" style="display:none; background-color: #1565c0 !important; margin-bottom: 15px;">Installa App Android</button>
            
            <button id="start-btn" class="btn-ersa">Inizia l'esercitazione</button>
            <p class="source-info">Fonte: ERSA • Aggiornato 2026</p>
        </div>

        <div id="quiz-container" style="display:none; height: 100%;"></div>
        <div id="score" style="display:none; height: 100%;"></div>
    </div>

    <script src="main.js"></script>
</body>
</html>
