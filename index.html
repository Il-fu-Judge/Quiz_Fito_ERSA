<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>Esercitazione Patentino Fitosanitari ERSA</title>

    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #f5f7f5;
            color: #333;
            overflow: hidden; /* Evita scroll inutili */
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center; /* Centratura verticale totale */
        }

        #app {
            max-width: 600px;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }

        /* SCHERMATA INIZIALE */
        .start-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        h1 {
            font-size: 26px;
            margin-bottom: 10px;
            color: #2e7d32;
        }

        .subtitle {
            font-size: 18px;
            margin-bottom: 30px;
            color: #555;
        }

        .source-info {
            font-size: 13px;
            color: #888;
        }

        /* QUIZ SCREEN */
        .quiz-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-bottom: 100px; /* Spazio per tasto sticky */
        }

        .question {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 25px;
            line-height: 1.4;
            text-align: center;
        }

        #timeBarContainer {
            width: 100%;
            height: 8px;
            background: #ddd;
            border-radius: 4px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        #timeBar {
            height: 100%;
            width: 100%;
            background: #2e7d32;
            transition: width 1s linear;
        }

        .option {
            border: 2px solid #2e7d32;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 14px;
            font-size: 18px;
            background: white;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .option.correct { background: #2e7d32; color: white; }
        .option.wrong { background: #f44336; color: white; border-color: #f44336; }

        /* PULSANTI */
        .btn-green {
            background: #2e7d32;
            color: white;
            font-size: 18px;
            padding: 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
        }

        #start-btn { width: 100%; margin-top: 20px; }

        #nextBtn {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 560px;
            display: none;
            z-index: 10;
        }

        /* RISULTATI */
        .result-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .result-title {
            font-size: 28px;
            font-weight: bold;
            color: #2e7d32; /* Sempre verde come richiesto */
            margin-bottom: 20px;
        }

        .score-box {
            width: 100%;
            padding: 40px 20px;
            border-radius: 15px;
            color: white;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .score-box h2 { font-size: 64px; margin: 0; }
        .score-box p { font-size: 18px; margin-top: 15px; line-height: 1.4; }

        .bg-pass { background-color: #2e7d32; }
        .bg-oral { background-color: #ff9800; }
        .bg-fail { background-color: #f44336; }

        #restartBtn { width: 100%; margin-top: 10px; }
    </style>
</head>

<body>
    <div id="app">
        <div id="start-screen" class="start-screen">
            <h1>Patentino Fitosanitario</h1>
            <p class="subtitle">Esercitazione per il rilascio del certificato di abilitazione.</p>
            <button id="start-btn" class="btn-green">Inizia il Quiz</button>
            <p class="source-info">Domande tratte dal sito ERSA • Aggiornato a Marzo 2026</p>
        </div>

        <div id="quiz-container" style="display:none; height: 100%;"></div>
        <div id="score" style="display:none; height: 100%;"></div>
    </div>
    <script src="main.js"></script>
</body>
</html>
