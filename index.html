<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>Esercitazione Patentino Fitosanitari ERSA</title>

    <style>
        /* RESET E BASE */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #f5f7f5;
            color: #333;
            overflow: hidden; /* Evita scroll durante il quiz */
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center; 
        }

        #app {
            max-width: 600px;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }

        /* PULSANTI ERSA (Grandi e verdi sempre) */
        .btn-ersa {
            background-color: #2e7d32;
            color: white;
            font-size: 18px;
            font-weight: bold;
            padding: 18px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            width: 100%;
            display: block;
            box-sizing: border-box;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .btn-ersa:active { transform: scale(0.98); }

        /* SCHERMATA INIZIALE */
        .start-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        h1 { font-size: 26px; color: #2e7d32; margin-bottom: 10px; }
        .subtitle { font-size: 18px; color: #555; margin-bottom: 30px; }
        .source-info { font-size: 13px; color: #888; margin-top: 20px; }

        /* QUIZ SCREEN - CENTRATURA VERTICALE REALE */
        .quiz-screen {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center; /* Centra verticalmente il blocco domanda/risposte */
        }

        .question {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 25px;
            line-height: 1.4;
            text-align: center;
        }

        #timeBarContainer {
            width: 100%;
            height: 10px;
            background: #ddd;
            border-radius: 5px;
            margin-bottom: 25px;
            overflow: hidden;
        }
        #timeBar {
            height: 100%;
            width: 100%;
            background: #2e7d32;
            transition: width 1s linear;
        }

        /* OPZIONI RISPOSTA */
        .option {
            border: 2px solid #2e7d32;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 14px;
            font-size: 18px;
            background: white;
            cursor: pointer;
            text-align: left;
        }
        .option.correct { background: #2e7d32 !important; color: white !important; }
        .option.wrong { background: #b71c1c !important; color: white !important; border-color: #b71c1c !important; }

        /* TASTO AVANTI STICKY */
        #nextBtn {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 560px;
            display: none;
            z-index: 100;
        }

        /* RISULTATI */
        .result-container {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .result-title {
            font-size: 28px;
            font-weight: bold;
            color: #2e7d32;
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        .score-box {
            width: 100%;
            padding: 40px 20px;
            border-radius: 20px;
            color: white;
            margin-bottom: 25px;
            box-sizing: border-box;
        }
